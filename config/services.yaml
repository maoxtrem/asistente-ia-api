# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.assistant_name: '%env(string:ASSISTANT_NAME)%'
    app.database_url: '%env(string:DATABASE_URL)%'
    app.qdrant_url: '%env(string:QDRANT_URL)%'
    app.chat_qdrant_collection: '%env(string:QDRANT_CHAT_COLLECTION)%'
    app.canvas_qdrant_collection: '%env(string:QDRANT_CANVAS_COLLECTION)%'
    app.embedding_provider_url: '%env(string:EMBEDDING_PROVIDER_URL)%'
    app.embedding_model: '%env(string:EMBEDDING_MODEL)%'
    app.chat_provider_url: '%env(string:CHAT_PROVIDER_URL)%'
    app.chat_model: '%env(string:CHAT_MODEL)%'
    app.chat_timeout: '%env(float:CHAT_TIMEOUT)%'
    app.chat_provider_kind: '%env(string:CHAT_PROVIDER_KIND)%'
    app.embedding_provider_kind: '%env(string:EMBEDDING_PROVIDER_KIND)%'
    app.chat_api_key: '%env(string:CHAT_API_KEY)%'
    app.embedding_api_key: '%env(string:EMBEDDING_API_KEY)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Service\QdrantClient:
        arguments:
            $qdrantUrl: '%app.qdrant_url%'

    App\Service\Ai\Chat\ChatPromptBuilder:
        arguments: []

    App\Service\Ai\Chat\LocalJsonChatProvider:
        arguments:
            $providerUrl: '%app.chat_provider_url%'
            $chatModel: '%app.chat_model%'
            $timeout: '%app.chat_timeout%'
        tags: ['app.chat_provider']

    App\Service\Ai\Chat\OpenAiCompatibleChatProvider:
        arguments:
            $providerUrl: '%app.chat_provider_url%'
            $chatModel: '%app.chat_model%'
            $timeout: '%app.chat_timeout%'
            $apiKey: '%app.chat_api_key%'
        tags: ['app.chat_provider']

    App\Service\Ai\Chat\ChatProviderSelector:
        arguments:
            $providerKind: '%app.chat_provider_kind%'
            $providers: !tagged_iterator app.chat_provider

    App\Contract\ChatProviderInterface: '@App\Service\Ai\Chat\ChatProviderSelector'

    App\Service\Ai\Embedding\LocalJsonEmbeddingProvider:
        arguments:
            $providerUrl: '%app.embedding_provider_url%'
            $embeddingModel: '%app.embedding_model%'
        tags: ['app.embedding_provider']

    App\Service\Ai\Embedding\OpenAiCompatibleEmbeddingProvider:
        arguments:
            $providerUrl: '%app.embedding_provider_url%'
            $embeddingModel: '%app.embedding_model%'
            $apiKey: '%app.embedding_api_key%'
        tags: ['app.embedding_provider']

    App\Service\Ai\Embedding\EmbeddingProviderSelector:
        arguments:
            $providerKind: '%app.embedding_provider_kind%'
            $providers: !tagged_iterator app.embedding_provider

    App\Contract\EmbeddingProviderInterface: '@App\Service\Ai\Embedding\EmbeddingProviderSelector'

    App\Service\VectorContextRetriever:
        arguments:
            $qdrantCollection: '%app.chat_qdrant_collection%'
            $documentKind: 'chat_knowledge'

    app.canvas_vector_context_retriever:
        class: App\Service\VectorContextRetriever
        arguments:
            $embeddingClient: '@App\Contract\EmbeddingProviderInterface'
            $qdrantClient: '@App\Service\QdrantClient'
            $qdrantCollection: '%app.canvas_qdrant_collection%'
            $documentKind: 'canvas_operational'

    App\Service\IndexDocumentProcessor:
        arguments:
            $qdrantCollection: '%app.chat_qdrant_collection%'

    app.canvas_index_document_processor:
        class: App\Service\IndexDocumentProcessor
        arguments:
            $embeddingClient: '@App\Contract\EmbeddingProviderInterface'
            $qdrantClient: '@App\Service\QdrantClient'
            $qdrantCollection: '%app.canvas_qdrant_collection%'

    App\Service\CanvasGenerationService:
        arguments:
            $vectorContextRetriever: '@app.canvas_vector_context_retriever'
            $indexDocumentProcessor: '@app.canvas_index_document_processor'

    App\Service\ChatHistoryRepository:
        arguments:
            $databaseUrl: '%app.database_url%'

    App\Controller\Api\ChatController:
        arguments:
            $assistantName: '%app.assistant_name%'

    App\Controller\Api\BootstrapController:
        arguments:
            $assistantName: '%app.assistant_name%'

    App\Controller\Api\HealthController:
        arguments:
            $assistantName: '%app.assistant_name%'

    App\Controller\Api\CanvasGenerationController:
        arguments:
            $assistantName: '%app.assistant_name%'

    App\Command\ReindexQdrantCollectionCommand:
        arguments:
            $qdrantCollection: '%app.chat_qdrant_collection%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
